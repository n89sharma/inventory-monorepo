version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/apps/backend"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      prisma:
        patterns: ["@prisma/*", "prisma"]
      clerk-backend:
        patterns: ["@clerk/*"]

  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      vite:
        patterns: ["vite", "@vitejs/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      clerk-frontend:
        patterns: ["@clerk/*"]
      radix:
        patterns: ["@radix-ui/*", "radix-ui"]
      tanstack:
        patterns: ["@tanstack/*"]

  - package-ecosystem: "npm"
    directory: "/packages/shared-types"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
