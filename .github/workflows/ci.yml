name: CI

on:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: |
          npm run tlint
          npm run blint
          npm run flint

      - name: Build (typechecks all workspaces)
        run: |
          npm run bbuild
          npm run fbuild
