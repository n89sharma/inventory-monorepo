name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*.*.*']

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Verify (lint, knip, typecheck)
        run: npm run verify

      - name: Build frontend bundle
        run: npm run fbuild

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: loon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Backend imports the `shared-types` package from its built dist/ output.
      - name: Build shared-types
        run: npm run tbuild

      # Tests run against loon_test; the guard + globalSetup require this file.
      - name: Write backend test env
        run: |
          cat > apps/backend/.env.test <<'EOF'
          DATABASE_URL=postgresql://postgres:postgres@localhost:5432/loon_test
          CLERK_PUBLISHABLE_KEY=pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY=sk_test_dummy
          EOF

      - name: Run backend tests
        run: npm run btest

  deploy-backend-production:
    needs: [verify, backend-tests]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: railway-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy backend to Railway production
        run: railway up --ci --service ${{ secrets.RAILWAY_BACKEND_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-frontend-production:
    needs: deploy-backend-production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    concurrency:
      group: vercel-production
      cancel-in-progress: false
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm i --global vercel@latest

      - name: Pull production env & project settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build with production env vars
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
